<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Регистрация - Bloomly</title>
    <link rel="stylesheet" href="./style-главная.css">
    <style>
        .auth-section {
            min-height: calc(100vh - 70px);
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: #F2F2F2;
            padding: 40px 20px;
            margin-top: 70px;
        }
        .auth-container {
            background: white;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 450px;
            border: 3px solid black;
        }
        .auth-title {
            font-family: 'P', serif;
            text-align: center;
            font-size: 28px;
            margin-bottom: 30px;
            color: #2C1810;
        }
        .form-group { margin-bottom: 20px; }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
            font-family: 'S', sans-serif;
            color: #2C1810;
        }
        .form-input {
            width: 100%;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
            font-family: 'S', sans-serif;
            transition: border-color 0.3s;
        }
        .form-input:focus { outline: none; border-color: #2C1810; }
        .btn-auth {
            width: 100%;
            padding: 14px;
            background-color: #2C1810;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 18px;
            cursor: pointer;
            font-family: 'S', sans-serif;
            transition: background 0.3s;
        }
        .btn-auth:hover { background-color: #473731; }
        .auth-footer {
            text-align: center;
            margin-top: 20px;
            font-size: 14px;
        }
        .auth-footer a {
            color: #2C1810;
            font-weight: bold;
            text-decoration: none;
        }
    </style>
</head>
<body>

    <nav>
        <div class="nav-container">
            <div class="logo">
                <a href="./Главная сайта.html">Bloomly</a>
            </div>
            <div class="desktop-nav">
                <a href="./Главная сайта.html">На главную</a>
                <a href="./Каталог.html">Каталог</a>
            </div>
        </div>
    </nav>

    <section class="auth-section">
        <div class="auth-container">
            <h2 class="auth-title">Регистрация</h2>
            
            <form id="registerForm" onsubmit="handleRegister(event)">
                <div class="form-group">
                    <label for="name">ФИО</label>
                    <input type="text" id="name" class="form-input" placeholder="Иванова Елена Алексеевна" required>
                </div>
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" class="form-input" placeholder="example@mail.ru" required>
                </div>
                <div class="form-group">
                    <label for="phone">Телефон</label>
                    <input type="tel" id="phone" class="form-input" placeholder="+7 (999) 000-00-00" required>
                </div>
                <div class="form-group">
                    <label for="password">Пароль</label>
                    <input type="password" id="password" class="form-input" placeholder="Придумайте пароль" required minlength="6">
                </div>
                <div class="form-group">
                    <label for="confirm-password">Подтвердите пароль</label>
                    <input type="password" id="confirm-password" class="form-input" placeholder="Повторите пароль" required>
                </div>
                <button type="submit" class="btn-auth">Зарегистрироваться</button>
            </form>

            <!-- Ссылка на страницу входа -->
            <div class="auth-footer">
                Уже есть аккаунт? <a href="./логин.html">Войти</a>
            </div>
        </div>
    </section>

    <script>
        function handleRegister(event) {
            event.preventDefault();
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirm-password').value;

            if (password !== confirmPassword) {
                alert('Пароли не совпадают!');
                return;
            }

            alert('Регистрация прошла успешно! Добро пожаловать в Bloomly.');
            window.location.href = './Главная сайта.html';
        }
    </script>
</body>
</html>
