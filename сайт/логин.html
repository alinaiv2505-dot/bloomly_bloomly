<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход - Bloomly</title>
    <link rel="stylesheet" href="./style-главная.css">
    <style>
        /* Стили идентичны регистрации для единообразия */
        .auth-section {
            min-height: calc(100vh - 70px);
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: #F2F2F2;
            padding: 40px 20px;
            margin-top: 70px;
        }
        .auth-container {
            background: white;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 450px;
            border: 3px solid black;
        }
        .auth-title {
            font-family: 'P', serif;
            text-align: center;
            font-size: 28px;
            margin-bottom: 30px;
            color: #2C1810;
        }
        .form-group { margin-bottom: 20px; }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
            font-family: 'S', sans-serif;
            color: #2C1810;
        }
        .form-input {
            width: 100%;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
            font-family: 'S', sans-serif;
            transition: border-color 0.3s;
        }
        .form-input:focus { outline: none; border-color: #2C1810; }
        .btn-auth {
            width: 100%;
            padding: 14px;
            background-color: #2C1810;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 18px;
            cursor: pointer;
            font-family: 'S', sans-serif;
            transition: background 0.3s;
        }
        .btn-auth:hover { background-color: #473731; }
        .auth-footer {
            text-align: center;
            margin-top: 20px;
            font-size: 14px;
        }
        .auth-footer a {
            color: #2C1810;
            font-weight: bold;
            text-decoration: none;
        }
        .auth-footer a:hover { text-decoration: underline; }
    </style>
</head>
<body>

    <!-- Шапка -->
    <nav>
        <div class="nav-container">
            <div class="logo">
                <a href="./Главная сайта.html">Bloomly</a>
            </div>
            <div class="desktop-nav">
                <a href="./Главная сайта.html">На главную</a>
                <a href="./Каталог.html">Каталог</a>
            </div>
        </div>
    </nav>

    <section class="auth-section">
        <div class="auth-container">
            <h2 class="auth-title">Вход в аккаунт</h2>
            
            <form id="loginForm" onsubmit="handleLogin(event)">
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" class="form-input" placeholder="example@mail.ru" required>
                </div>

                <div class="form-group">
                    <label for="password">Пароль</label>
                    <input type="password" id="password" class="form-input" placeholder="Введите пароль" required>
                </div>

                <button type="submit" class="btn-auth">Войти</button>
            </form>

            <div class="auth-footer">
                Нет аккаунта? <a href="./регистрация.html">Зарегистрироваться</a>
            </div>
        </div>
    </section>

    <script>
        function handleLogin(event) {
            event.preventDefault();
            const email = document.getElementById('email').value;
            
            // Имитация входа (в реальном проекте здесь будет запрос к серверу)
            alert(`Добро пожаловать, ${email}!`);
            window.location.href = './Главная сайта.html';
        }
    </script>
</body>
</html>
